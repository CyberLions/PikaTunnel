name: Build and Deploy

on:
  push:
    branches: [ "main" , "staging" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Extract branch name
      shell: bash
      run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
      id: extract_branch

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to CCSO Docker Registry
      uses: docker/login-action@v3
      with:
        registry: registry.psuccso.org
        username: robot$pikatunnel+github
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Generate Tag Names
      run: |
        if [ ${{ steps.extract_branch.outputs.branch }} = "main" ]; then
          echo "TAG_LATEST=pikatunnel:latest" >> $GITHUB_ENV
          echo "TAG_COMMIT=pikatunnel:$(git rev-parse --short HEAD)" >> $GITHUB_ENV
        elif [ ${{ steps.extract_branch.outputs.branch }} = "staging" ]; then
          echo "TAG_LATEST=pikatunnel-stage:latest" >> $GITHUB_ENV
          echo "TAG_COMMIT=pikatunnel-stage:$(git rev-parse --short HEAD)" >> $GITHUB_ENV
        else
          exit 0
        fi

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        file: ./Dockerfile
        push: true
        tags: |
          registry.psuccso.org/pikatunnel/${{ env.TAG_LATEST }}
          registry.psuccso.org/pikatunnel/${{ env.TAG_COMMIT }}
        cache-from: type=registry,ref=registry.psuccso.org/pikatunnel/${{ env.TAG_LATEST }}
        cache-to: type=inline

  deploy-rancher:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
    - name: Extract branch name
      shell: bash
      run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
      id: extract_branch

    - name: Redeploy Rancher
      run: |
        set -euo pipefail

        url='https://rancher.psuccso.org'
        cluster=local
        token=${{ secrets.RANCHER_TOKEN }}

        redeploy() {
            local namespace=$1
            local app=$2
            local timestamp
            timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            # Trigger a rolling restart by patching the pod template's
            # restartedAt annotation — same mechanism as `kubectl rollout restart`.
            # strategic-merge-patch doesn't require metadata.resourceVersion.
            # Use the Rancher Steve API path that the previous GET/PUT script
            # used; it's known to exist on this cluster.
            curl -fsSL -k -u "$token" \
              -X PATCH \
              -H 'Accept: application/json' \
              -H 'Content-Type: application/strategic-merge-patch+json' \
              --data "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"$timestamp\"}}}}}" \
              "$url/k8s/clusters/$cluster/v1/apps.deployments/$namespace/$app"
        }

        branch=${{ steps.extract_branch.outputs.branch }}
        if [ "$branch" = "main" ]; then
            redeploy pikatunnel pikatunnel
        elif [ "$branch" = "staging" ]; then
            redeploy pikatunnel-staging pikatunnel
        else
            exit 0
        fi
