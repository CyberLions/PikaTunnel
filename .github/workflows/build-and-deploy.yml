name: Build and Deploy

on:
  push:
    branches: ["main", "staging"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract branch name
        shell: bash
        run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
        id: extract_branch

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to CCSO Docker Registry
        uses: docker/login-action@v3
        with:
          registry: registry.psuccso.org
          username: robot$pikatunnel+github
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Tag Names
        run: |
          if [ ${{ steps.extract_branch.outputs.branch }} = "main" ]; then
            echo "TAG_LATEST=pikatunnel:latest" >> $GITHUB_ENV
            echo "TAG_COMMIT=pikatunnel:$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          elif [ ${{ steps.extract_branch.outputs.branch }} = "staging" ]; then
            echo "TAG_LATEST=pikatunnel-stage:latest" >> $GITHUB_ENV
            echo "TAG_COMMIT=pikatunnel-stage:$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          else
            exit 0
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: ./Dockerfile
          push: true
          tags: |
            registry.psuccso.org/pikatunnel/${{ env.TAG_LATEST }}
            registry.psuccso.org/pikatunnel/${{ env.TAG_COMMIT }}
          cache-from: type=registry,ref=registry.psuccso.org/pikatunnel/${{ env.TAG_LATEST }}
          cache-to: type=inline

  deploy-rancher:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Extract branch name
        shell: bash
        run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
        id: extract_branch

      - name: Redeploy Rancher
        run: |
          set -euo pipefail

          url='https://rancher.psuccso.org'
          cluster=local
          token=${{ secrets.RANCHER_TOKEN }}

          command -v jq >/dev/null 2>&1 || { echo "jq is required on the runner"; exit 1; }

          # GET the Deployment through Rancher's Steve API, update the pod
          # template's restartedAt annotation + cattle.io/timestamp with jq
          # (preserving metadata.resourceVersion), then PUT the modified
          # resource back. This is the working pattern that the Telaeris
          # workflow uses, but with jq instead of sed so we can't silently
          # drop fields or corrupt the body via stderr merging.
          redeploy() {
              local namespace=$1
              local app=$2
              local endpoint now body updated resp http_code rv

              endpoint="$url/k8s/clusters/$cluster/v1/apps.deployments/$namespace/$app"
              now=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              body=$(mktemp)
              updated=$(mktemp)
              resp=$(mktemp)
              trap 'rm -f "$body" "$updated" "$resp"' RETURN

              http_code=$(curl -k -sS -u "$token" \
                  -o "$body" -w '%{http_code}' \
                  -H 'Accept: application/json' \
                  "$endpoint")
              if [ "$http_code" -ne 200 ]; then
                  echo "GET $namespace/$app failed (HTTP $http_code):"
                  cat "$body"
                  return 1
              fi

              rv=$(jq -r '.metadata.resourceVersion // empty' "$body")
              if [ -z "$rv" ]; then
                  echo "GET response has no metadata.resourceVersion; cannot update. Body was:"
                  cat "$body"
                  return 1
              fi
              echo "Got $namespace/$app @ resourceVersion=$rv"

              jq --arg now "$now" '
                  (.metadata.annotations //= {}) |
                  .metadata.annotations["cattle.io/timestamp"] = $now |
                  (.spec.template.metadata //= {}) |
                  (.spec.template.metadata.annotations //= {}) |
                  .spec.template.metadata.annotations["kubectl.kubernetes.io/restartedAt"] = $now
              ' "$body" > "$updated"

              http_code=$(curl -k -sS -u "$token" \
                  -o "$resp" -w '%{http_code}' \
                  -X PUT \
                  -H 'Accept: application/json' \
                  -H 'Content-Type: application/json' \
                  --data-binary "@$updated" \
                  "$endpoint")

              if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
                  echo "Redeployed $namespace/$app (HTTP $http_code)"
                  return 0
              fi
              echo "PUT $namespace/$app failed (HTTP $http_code):"
              cat "$resp"
              return 1
          }

          branch=${{ steps.extract_branch.outputs.branch }}

          if [ "$branch" = "main" ]; then
            redeploy "pritunl" "pikatunnel"
          elif [ "$branch" = "staging" ]; then
            redeploy "pritunl-staging" "pikatunnel"
          fi
