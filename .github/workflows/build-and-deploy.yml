name: Build and Deploy

on:
  push:
    branches: ["main", "staging"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract branch name
        shell: bash
        run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
        id: extract_branch

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to CCSO Docker Registry
        uses: docker/login-action@v3
        with:
          registry: registry.psuccso.org
          username: robot$pikatunnel+github
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Tag Names
        run: |
          if [ ${{ steps.extract_branch.outputs.branch }} = "main" ]; then
            echo "TAG_LATEST=pikatunnel:latest" >> $GITHUB_ENV
            echo "TAG_COMMIT=pikatunnel:$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          elif [ ${{ steps.extract_branch.outputs.branch }} = "staging" ]; then
            echo "TAG_LATEST=pikatunnel-stage:latest" >> $GITHUB_ENV
            echo "TAG_COMMIT=pikatunnel-stage:$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          else
            exit 0
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: ./Dockerfile
          push: true
          tags: |
            registry.psuccso.org/pikatunnel/${{ env.TAG_LATEST }}
            registry.psuccso.org/pikatunnel/${{ env.TAG_COMMIT }}
          cache-from: type=registry,ref=registry.psuccso.org/pikatunnel/${{ env.TAG_LATEST }}
          cache-to: type=inline

  deploy-rancher:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Extract branch name
        shell: bash
        run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
        id: extract_branch

      - name: Redeploy Rancher
        run: |
          set -euo pipefail

          url='https://rancher.psuccso.org'
          cluster=local
          token=${{ secrets.RANCHER_TOKEN }}

          # Use the Rancher Steve API's built-in `redeploy` action instead of
          # GET→sed→PUT. Posting to ?action=redeploy triggers Rancher to bump
          # the pod template annotation server-side, so we don't have to
          # round-trip the full resource (which was losing metadata.resourceVersion).
          redeploy() {
              local namespace=$1
              local app=$2
              local http_code body
              body=$(mktemp)
              http_code=$(curl -k -sS -u "$token" \
                -o "$body" -w '%{http_code}' \
                -X POST \
                -H 'Accept: application/json' \
                -H 'Content-Length: 0' \
                "$url/k8s/clusters/$cluster/v1/apps.deployments/$namespace/$app?action=redeploy")

              if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
                  echo "Redeployed $namespace/$app (HTTP $http_code)"
              else
                  echo "Redeploy FAILED for $namespace/$app (HTTP $http_code):"
                  cat "$body"
                  rm -f "$body"
                  exit 1
              fi
              rm -f "$body"
          }

          branch=${{ steps.extract_branch.outputs.branch }}

          if [ "$branch" = "main" ]; then
            redeploy "pikatunnel" "pikatunnel"
          elif [ "$branch" = "staging" ]; then
            redeploy "pikatunnel-staging" "pikatunnel"
          fi
