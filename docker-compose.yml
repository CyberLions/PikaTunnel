services:
  pikatunnel:
    build: .
    ports:
      - "80:80"
    environment:
      DATABASE_URL: postgresql+asyncpg://pikatunnel:pikatunnel@db:5432/pikatunnel
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ENVIRONMENT: production
      VPN_ENABLED: ${VPN_ENABLED:-false}
      VPN_TYPE: ${VPN_TYPE:-pritunl}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pikatunnel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pikatunnel}
      POSTGRES_DB: pikatunnel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pikatunnel"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
