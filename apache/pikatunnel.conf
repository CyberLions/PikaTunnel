<VirtualHost *:3000>
    ServerName localhost
    DocumentRoot /var/www/pikatunnel

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto expr=%{REQUEST_SCHEME}
    RequestHeader set X-Forwarded-Host expr=%{HTTP_HOST}

    ProxyPass /api/ http://127.0.0.1:8000/api/
    ProxyPassReverse /api/ http://127.0.0.1:8000/api/

    <Directory /var/www/pikatunnel>
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/pikatunnel-error.log
    CustomLog ${APACHE_LOG_DIR}/pikatunnel-access.log combined
</VirtualHost>
